<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicons - all sizes -->
    <link rel="icon" type="image/x-icon" href="/icons/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/icons/favicon-64x64.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/favicon-192x192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#34291F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- "black-translucent" lets the web view extend behind the iOS status
         bar so the resident-home hero paints its brown gradient under the
         system text (clock / signal / battery sit on top of the hero with
         no white strip). Pages that don't paint their own top stripe rely
         on MobileHeader's padding-top: calc(env(safe-area-inset-top)+12px)
         to keep content out of the notch. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="kamizo" />
    <meta name="apple-mobile-web-app-title" content="kamizo" />
    <!-- iOS splash screens (portrait). Single high-res asset; iOS scales it
         and the system fills with theme_color/background_color from manifest. -->
    <link rel="apple-touch-startup-image" href="/icons/logo-hq-1024.png" />
    <meta name="description" content="Приложение для управления многоквартирными домами. Заявки, чат с УК, объявления, собрания." />
    <meta name="msapplication-TileColor" content="#F97316" />
    <meta name="msapplication-TileImage" content="/icons/favicon-128x128.png" />
    <title>kamizo - Управление жильём</title>
  </head>
  <body>
    <div id="root">
      <!-- Splash — premium branded loader. A single rounded brand tile holds
           the "K" monogram with a gradient-stroked aperture ring that traces
           around it (suggesting "loading"). The wordmark sits below with a
           subtle breathe, followed by three staggered dots in brand colour.
           Background matches --app-bg so there is zero flash when React
           hydrates and replaces #root. Pure inline SVG + CSS, no JS, no
           network — paints on first frame. -->
      <div class="kamizo-splash" aria-label="Загрузка Kamizo" role="status">
        <div class="kamizo-splash__mark">
          <!-- Soft brand halo behind the tile. -->
          <span class="kamizo-splash__halo" aria-hidden="true"></span>

          <svg
            class="kamizo-splash__logo"
            viewBox="0 0 96 96"
            width="96"
            height="96"
            aria-hidden="true"
          >
            <defs>
              <linearGradient id="kamizoBrand" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%"  stop-color="#F59E0B" />
                <stop offset="100%" stop-color="#E8621A" />
              </linearGradient>
              <linearGradient id="kamizoRing" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%"  stop-color="#E8621A" />
                <stop offset="50%" stop-color="#F59E0B" />
                <stop offset="100%" stop-color="#E8621A" stop-opacity="0" />
              </linearGradient>
            </defs>

            <!-- Brand tile -->
            <rect x="8" y="8" width="80" height="80" rx="22"
                  fill="url(#kamizoBrand)" />

            <!-- Inner shine for depth -->
            <rect x="8" y="8" width="80" height="80" rx="22"
                  fill="none"
                  stroke="rgba(255,255,255,0.18)" stroke-width="1" />

            <!-- Wordmark "K" -->
            <text
              x="48" y="62"
              text-anchor="middle"
              font-family="'Manrope', -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
              font-size="48" font-weight="800" fill="#FFF"
              letter-spacing="-0.02em"
            >K</text>

            <!-- Traceing ring around the tile. dasharray ≈ perimeter 320, the
                 animation rotates the gap so the gradient sweeps the border. -->
            <rect class="kamizo-splash__ring"
                  x="3" y="3" width="90" height="90" rx="26"
                  fill="none"
                  stroke="url(#kamizoRing)"
                  stroke-width="2"
                  stroke-linecap="round"
                  pathLength="360"
                  stroke-dasharray="80 280" />
          </svg>
        </div>

        <!-- Wordmark + 3-dot pulse -->
        <div class="kamizo-splash__title">kamizo</div>
        <div class="kamizo-splash__dots" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
    <style>
      /* --app-bg from src/index.css :root — keep in sync. Inline because the
         CSS bundle hasn't loaded yet at first paint. */
      .kamizo-splash {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 20px;
        background: #F7F8FA;
        padding-top: env(safe-area-inset-top, 0);
        padding-bottom: env(safe-area-inset-bottom, 0);
        /* Self-fade-out when React replaces #root: this rule never triggers
           because createRoot wipes children, but the inline opacity transition
           below smooths the change of paint. */
        animation: kamizo-splash-in 0.4s ease-out both;
      }
      .kamizo-splash__mark {
        position: relative;
        width: 96px; height: 96px;
        display: grid; place-items: center;
        animation: kamizo-breathe 2.8s ease-in-out infinite;
      }
      .kamizo-splash__halo {
        position: absolute; inset: -24px;
        border-radius: 36px;
        background: radial-gradient(closest-side,
                    rgba(249, 115, 22, 0.22),
                    rgba(249, 115, 22, 0) 70%);
        animation: kamizo-halo 2.8s ease-in-out infinite;
      }
      .kamizo-splash__logo {
        position: relative;
        filter: drop-shadow(0 12px 28px rgba(232, 98, 26, 0.28));
      }
      .kamizo-splash__ring {
        transform-origin: 48px 48px;
        animation: kamizo-trace 1.6s linear infinite;
      }
      .kamizo-splash__title {
        font: 700 22px/1 'Manrope', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        letter-spacing: -0.02em;
        color: #111827;
        opacity: 0;
        animation: kamizo-title-in 0.6s ease-out 0.1s forwards;
      }
      .kamizo-splash__dots {
        display: flex; gap: 6px;
        margin-top: 2px;
      }
      .kamizo-splash__dots > span {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: #F97316;
        opacity: 0.35;
        animation: kamizo-dot 1.1s ease-in-out infinite;
      }
      .kamizo-splash__dots > span:nth-child(2) { animation-delay: 0.15s; }
      .kamizo-splash__dots > span:nth-child(3) { animation-delay: 0.3s; }

      @keyframes kamizo-breathe {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.04); }
      }
      @keyframes kamizo-halo {
        0%, 100% { opacity: 0.55; transform: scale(0.94); }
        50%      { opacity: 1;    transform: scale(1.08); }
      }
      @keyframes kamizo-trace {
        0%   { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes kamizo-title-in {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes kamizo-dot {
        0%, 100% { opacity: 0.3; transform: translateY(0); }
        50%      { opacity: 1;   transform: translateY(-3px); }
      }
      @keyframes kamizo-splash-in {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      /* iPhone SE 320px — keep mark at 96px (fits comfortably) but tighten gap. */
      @media (max-width: 360px) {
        .kamizo-splash { gap: 16px; }
      }
      @media (prefers-reduced-motion: reduce) {
        .kamizo-splash__mark,
        .kamizo-splash__halo,
        .kamizo-splash__ring,
        .kamizo-splash__dots > span,
        .kamizo-splash__title,
        .kamizo-splash {
          animation: none !important;
        }
        .kamizo-splash__title { opacity: 1; }
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            const registration = await navigator.serviceWorker.register('/sw.js', {
              scope: '/'
            });
            console.log('[App] Service Worker registered:', registration.scope);

            // Check for updates
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              console.log('[App] Service Worker update found');

              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New service worker available, prompt user to refresh
                  console.log('[App] New version available');
                }
              });
            });
          } catch (error) {
            console.error('[App] Service Worker registration failed:', error);
          }
        });
      }
    </script>
  </body>
</html>
