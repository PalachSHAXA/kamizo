<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kamizo · Чат админа УК</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="tokens.css" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: "Manrope", system-ui, sans-serif; }
  @keyframes kzPulse { 0%,100%{opacity:1} 50%{opacity:.45} }
  @keyframes kzPop { 0%{opacity:0;transform:scale(0.96) translateY(-4px)} 100%{opacity:1;transform:scale(1) translateY(0)} }
  @keyframes kzScreenIn { 0%{opacity:0;transform:translateY(8px)} 100%{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="browser-window.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="kamizo-icons.jsx"></script>
<script type="text/babel" src="kamizo-admin-data.jsx"></script>
<script type="text/babel" src="kamizo-admin-chat.jsx"></script>
<script type="text/babel" src="kamizo-admin-dialog.jsx"></script>

<script type="text/babel" data-presets="react">
function Phone({ children }) {
  return (
    <div style={{ width: 402, height: 874, position: 'relative' }}>
      <IOSDevice width={402} height={874}>
        <div style={{ position: 'absolute', inset: 0, overflow: 'hidden' }}>{children}</div>
      </IOSDevice>
    </div>
  );
}

function Desktop({ children, url }) {
  return (
    <ChromeWindow width={1240} height={812} url={url}
      tabs={[{ title: 'Kamizo · Панель УК' }, { title: 'Заявки' }]}>
      <div style={{ height: '100%' }}>{children}</div>
    </ChromeWindow>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="desktop" title="Рабочее место оператора · десктоп"
        subtitle="Двухпанельный инбокс: список диалогов слева, активный диалог справа. Кликайте по карточкам и пробуйте поиск, фильтры, шаблоны.">
        <DCArtboard id="d-active" label="Активный диалог" width={1240} height={812}>
          <Desktop url="panel.kamizo.uz/messages"><AdminInbox mode="desktop" loading={false} /></Desktop>
        </DCArtboard>
        <DCArtboard id="d-empty" label="Пустое состояние" width={1240} height={812}>
          <Desktop url="panel.kamizo.uz/messages"><AdminInbox mode="desktop" loading={false} startEmpty /></Desktop>
        </DCArtboard>
      </DCSection>

      <DCSection id="mobile" title="Инбокс на мобайле · два экрана"
        subtitle="На телефоне список и диалог — два экрана с переходом (тап по карточке → диалог, ← назад).">
        <DCArtboard id="m-list" label="Список диалогов" width={402} height={874}>
          <Phone><AdminInbox mode="mobile" initialView="list" loading={false} /></Phone>
        </DCArtboard>
        <DCArtboard id="m-dialog" label="Открытый диалог" width={402} height={874}>
          <Phone><AdminInbox mode="mobile" initialView="dialog" initialId="c1" loading={false} /></Phone>
        </DCArtboard>
        <DCArtboard id="m-loading" label="Загрузка (скелетон)" width={402} height={874}>
          <Phone><AdminInbox mode="mobile" loading={true} /></Phone>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
