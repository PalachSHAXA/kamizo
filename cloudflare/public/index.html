  <body>
    <div id="root">
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;height:100dvh;background:#ffffff;">
        <img src="/icons/favicon-64x64.png" alt="" style="width:48px;height:48px;animation:kamizo-pulse 1.5s ease-in-out infinite" />
      </div>
    </div>
    <style>
      @keyframes kamizo-pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    </style>
    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            const registration = await navigator.serviceWorker.register('/sw.js', {
              scope: '/'
            });
            console.log('[App] Service Worker registered:', registration.scope);

            // Check for updates
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              console.log('[App] Service Worker update found');

              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New service worker available, prompt user to refresh
                  console.log('[App] New version available');
                }
              });
            });
          } catch (error) {
            console.error('[App] Service Worker registration failed:', error);
          }
        });
      }
    </script>
