    <!-- Global theme-color is the app body / --app-bg (index.css :root) —
         #F4F0E8 warm beige, matching the Claude Design palette. FINAL RULE:
         light/beige status-bar chrome on EVERY page, no exceptions.
         Pages MUST NOT override this to a dark tint; the Home hero stays
         brown visually but starts BELOW env(safe-area-inset-top) via its
         margin, so the status-bar zone always paints the light app bg. -->
    <meta name="theme-color" content="#F4F0E8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- "default" status-bar-style keeps the iOS PWA status bar as a
         system strip with dark text on the light background (matching
         theme-color). We previously used "black-translucent" to let the
         Home hero paint brown behind the bar; the new rule is no brown
         behind the status bar anywhere, so the web view no longer extends
         behind it. MobileHeader's padding-top: calc(safe-area-inset-top
         + 12px) still keeps content clear of the notch. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="kamizo" />
    <meta name="apple-mobile-web-app-title" content="kamizo" />
    <!-- iOS splash screens (portrait). Single high-res asset; iOS scales it
         and the system fills with theme_color/background_color from manifest. -->
    <link rel="apple-touch-startup-image" href="/icons/logo-hq-1024.png" />
    <meta name="description" content="Приложение для управления многоквартирными домами. Заявки, чат с УК, объявления, собрания." />

  <body>
    <div id="root">
      <!-- Splash — premium branded loader. A single rounded brand tile holds
           the "K" monogram with a gradient-stroked aperture ring that traces
           around it (suggesting "loading"). The wordmark sits below with a
           subtle breathe, followed by three staggered dots in brand colour.
           Background matches --app-bg so there is zero flash when React
           hydrates and replaces #root. Pure inline SVG + CSS, no JS, no
           network — paints on first frame. -->
      <div class="kamizo-splash" aria-label="Загрузка Kamizo" role="status">
        <div class="kamizo-splash__mark">
          <!-- Soft brand halo behind the tile. -->
          <span class="kamizo-splash__halo" aria-hidden="true"></span>

          <svg
            class="kamizo-splash__logo"
            viewBox="0 0 96 96"
            width="96"
            height="96"
            aria-hidden="true"
          >
            <defs>
              <linearGradient id="kamizoBrand" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%"  stop-color="#F59E0B" />
                <stop offset="100%" stop-color="#E8621A" />
              </linearGradient>
              <linearGradient id="kamizoRing" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%"  stop-color="#E8621A" />
                <stop offset="50%" stop-color="#F59E0B" />
                <stop offset="100%" stop-color="#E8621A" stop-opacity="0" />
              </linearGradient>
            </defs>

            <!-- Brand tile -->
            <rect x="8" y="8" width="80" height="80" rx="22"
                  fill="url(#kamizoBrand)" />

            <!-- Inner shine for depth -->
            <rect x="8" y="8" width="80" height="80" rx="22"
                  fill="none"
                  stroke="rgba(255,255,255,0.18)" stroke-width="1" />

            <!-- Wordmark "K" -->
            <text
              x="48" y="62"
              text-anchor="middle"
              font-family="'Manrope', -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
              font-size="48" font-weight="800" fill="#FFF"
              letter-spacing="-0.02em"
            >K</text>

            <!-- Traceing ring around the tile. dasharray ≈ perimeter 320, the
                 animation rotates the gap so the gradient sweeps the border. -->
            <rect class="kamizo-splash__ring"
                  x="3" y="3" width="90" height="90" rx="26"
                  fill="none"
                  stroke="url(#kamizoRing)"
                  stroke-width="2"
                  stroke-linecap="round"
                  pathLength="360"
                  stroke-dasharray="80 280" />
          </svg>
        </div>

        <!-- Wordmark + 3-dot pulse -->
        <div class="kamizo-splash__title">kamizo</div>
        <div class="kamizo-splash__dots" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
    <style>
      /* --app-bg from src/index.css :root — keep in sync. Inline because the
         CSS bundle hasn't loaded yet at first paint. */
      .kamizo-splash {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 20px;
        background: #F4F0E8;
        padding-top: env(safe-area-inset-top, 0);
        padding-bottom: env(safe-area-inset-bottom, 0);
        /* Self-fade-out when React replaces #root: this rule never triggers
           because createRoot wipes children, but the inline opacity transition
           below smooths the change of paint. */
        animation: kamizo-splash-in 0.4s ease-out both;
      }
      .kamizo-splash__mark {
        position: relative;
        width: 96px; height: 96px;
        display: grid; place-items: center;
        animation: kamizo-breathe 2.8s ease-in-out infinite;
      }
      .kamizo-splash__halo {
        position: absolute; inset: -24px;
        border-radius: 36px;
        background: radial-gradient(closest-side,
                    rgba(249, 115, 22, 0.22),
                    rgba(249, 115, 22, 0) 70%);
        animation: kamizo-halo 2.8s ease-in-out infinite;
      }
      .kamizo-splash__logo {
        position: relative;
        filter: drop-shadow(0 12px 28px rgba(232, 98, 26, 0.28));
      }
      .kamizo-splash__ring {
        transform-origin: 48px 48px;
        animation: kamizo-trace 1.6s linear infinite;
      }
      .kamizo-splash__title {
        font: 700 22px/1 'Manrope', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        letter-spacing: -0.02em;
        color: #111827;
        opacity: 0;
        animation: kamizo-title-in 0.6s ease-out 0.1s forwards;
      }
      .kamizo-splash__dots {
        display: flex; gap: 6px;
        margin-top: 2px;
      }
      .kamizo-splash__dots > span {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: #F97316;
        opacity: 0.35;
        animation: kamizo-dot 1.1s ease-in-out infinite;
      }
      .kamizo-splash__dots > span:nth-child(2) { animation-delay: 0.15s; }
      .kamizo-splash__dots > span:nth-child(3) { animation-delay: 0.3s; }

      @keyframes kamizo-breathe {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.04); }
      }
      @keyframes kamizo-halo {
        0%, 100% { opacity: 0.55; transform: scale(0.94); }
        50%      { opacity: 1;    transform: scale(1.08); }
      }
      @keyframes kamizo-trace {
        0%   { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes kamizo-title-in {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes kamizo-dot {
        0%, 100% { opacity: 0.3; transform: translateY(0); }
        50%      { opacity: 1;   transform: translateY(-3px); }
      }
      @keyframes kamizo-splash-in {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      /* iPhone SE 320px — keep mark at 96px (fits comfortably) but tighten gap. */
      @media (max-width: 360px) {
        .kamizo-splash { gap: 16px; }
      }
      @media (prefers-reduced-motion: reduce) {
        .kamizo-splash__mark,
        .kamizo-splash__halo,
        .kamizo-splash__ring,
        .kamizo-splash__dots > span,
        .kamizo-splash__title,
        .kamizo-splash {
          animation: none !important;
        }
        .kamizo-splash__title { opacity: 1; }
      }
    </style>
    <script>
      // ── Chunk-load crash guard ─────────────────────────────────────
      // Attaches BEFORE /src/main.tsx so it can catch the very first
      // module-import failure. When a previous-deploy hashed chunk
      // (/assets/<name>-<hash>.js) 404s — because the deploy purged it
      // and our SW just evicted it from the v(n-1) ASSET_CACHE in its
      // activate handler — the browser raises one of:
      //   • "Importing a module script failed"
      //   • "Failed to fetch dynamically imported module"
      //   • "error loading dynamically imported module"
      //   • "Loading chunk N failed"
      //   • a ChunkLoadError
      // The right recovery is a one-shot hard reload after purging the
      // SW caches and unregistering the (now-stale) SW. We do that here,
      // guarded by a sessionStorage flag so a persistent failure
      // (origin truly broken) cannot loop. If the same crash fires twice
      // in one session, we surface it instead of reloading again.
      (function installChunkLoadGuard() {
        var RELOAD_KEY = 'kz_chunk_reload_attempted';
        var PATTERNS = [
          /Importing a module script failed/i,
          /Failed to fetch dynamically imported module/i,
          /error loading dynamically imported module/i,
          /Loading chunk [\w-]+ failed/i,
          /ChunkLoadError/i,
          /Unable to preload CSS/i,
        ];
        function isChunkError(err) {
          if (!err) return false;
          var msg = (err && err.message) || String(err) || '';
          var name = err && err.name;
          if (name === 'ChunkLoadError') return true;
          for (var i = 0; i < PATTERNS.length; i++) {
            if (PATTERNS[i].test(msg)) return true;
          }
          return false;
        }
        function recover() {
          // One-shot: never loop. If we already tried once this session,
          // fall through to the browser's default handling.
          try {
            if (sessionStorage.getItem(RELOAD_KEY)) return;
            sessionStorage.setItem(RELOAD_KEY, String(Date.now()));
          } catch (_) { /* private mode: still attempt one reload */ }

          var done = function () { window.location.reload(); };
          var deadline = setTimeout(done, 1500); // hard cap — never wait forever

          try {
            if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
              // Tell the SW to drop every cache so the reload fetches
              // fresh HTML + chunks from origin (no stale anything).
              navigator.serviceWorker.controller.postMessage({ type: 'CLEAR_CACHE' });
            }
            // Unregister stale SW(s) too — the next page load will
            // re-register from the fresh index.html.
            if ('serviceWorker' in navigator && navigator.serviceWorker.getRegistrations) {
              navigator.serviceWorker.getRegistrations().then(function (regs) {
                Promise.all(regs.map(function (r) { return r.unregister().catch(function () {}); }))
                  .then(function () { clearTimeout(deadline); done(); }, function () { clearTimeout(deadline); done(); });
              }, function () { clearTimeout(deadline); done(); });
            } else {
              clearTimeout(deadline);
              done();
            }
          } catch (_) {
            clearTimeout(deadline);
            done();
          }
        }
        // A page that boots successfully should clear the one-shot flag
        // so the NEXT genuine chunk crash can recover the same way.
        window.addEventListener('load', function () {
          try { sessionStorage.removeItem(RELOAD_KEY); } catch (_) {}
        });
        window.addEventListener('error', function (e) {
          if (isChunkError(e && e.error) || isChunkError({ message: e && e.message })) {
            recover();
          }
        }, true);
        window.addEventListener('unhandledrejection', function (e) {
          if (isChunkError(e && e.reason)) {
            recover();
          }
        });
      })();
    </script>
    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        // Auto-reload once when a NEW service worker takes control of this page.
        // Only attach when there is ALREADY a controller — that guarantees this
        // is an update event (replacing an existing SW), not a first install.
        // Without this guard the listener would fire on the very first visit
        // and force an unnecessary reload of a fresh page.
        if (navigator.serviceWorker.controller) {
          let hasReloaded = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (hasReloaded) return;
            hasReloaded = true;
            window.location.reload();
          });
        }

        window.addEventListener('load', async () => {
          try {
            const registration = await navigator.serviceWorker.register('/sw.js', {
              scope: '/'
            });
            console.log('[App] Service Worker registered:', registration.scope);

            // If a worker is already waiting at registration time, activate it
            // immediately — otherwise it could sit in 'waiting' until every tab
            // closes, leaving the user on the stale bundle indefinitely.
            if (registration.waiting) {
              registration.waiting.postMessage({ type: 'SKIP_WAITING' });
            }

            // Check for updates
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              console.log('[App] Service Worker update found');

              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New SW is ready. Ask it to take over now — combined with
                  // the controllerchange listener above this delivers the new
                  // bundle to the user without a manual refresh.
                  console.log('[App] New version available — activating');
                  newWorker.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            });
          } catch (error) {
            console.error('[App] Service Worker registration failed:', error);
          }
        });
      }
    </script>
  </body>
