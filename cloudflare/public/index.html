  <body>
    <div id="root">
      <!-- Splash — themed apartment-building loader. A 4-storey building
           silhouette in brand orange with windows lighting up one by one
           (sequential glow), evoking "evening in the residential complex
           where Kamizo lives". The K monogram floats above the roof as a
           sign for the building. Pure inline SVG + CSS, runs before the
           bundle hydrates. -->
      <div class="kamizo-splash">
        <svg
          class="kamizo-building"
          viewBox="0 0 200 240"
          width="200"
          height="240"
          aria-hidden="true"
        >
          <!-- Floating "K" sign above the roof. Wraps in a group with a
               separate float animation so the monogram bobs independently
               from the building. -->
          <g class="kamizo-sign">
            <rect x="80" y="8" width="40" height="40" rx="11" fill="#F97316" />
            <text
              x="100" y="38"
              text-anchor="middle"
              font-family="-apple-system, BlinkMacSystemFont, Inter, system-ui, sans-serif"
              font-size="26" font-weight="800" fill="#FFF"
            >K</text>
          </g>
          <!-- Sign post — connects the K plate to the building roof. -->
          <line x1="100" y1="48" x2="100" y2="60" stroke="#FED7AA" stroke-width="2" stroke-linecap="round" />

          <!-- Roof — slight overhang. -->
          <path d="M40 64 L100 60 L160 64 L160 72 L40 72 Z" fill="#9A3412" />

          <!-- Building body — soft brand-tinted facade. -->
          <rect x="44" y="72" width="112" height="160" rx="6" fill="#FFEDD5" stroke="#FDBA74" stroke-width="1.5" />

          <!-- Floor dividers. -->
          <line x1="44" y1="112" x2="156" y2="112" stroke="#FDBA74" stroke-width="1" />
          <line x1="44" y1="152" x2="156" y2="152" stroke="#FDBA74" stroke-width="1" />
          <line x1="44" y1="192" x2="156" y2="192" stroke="#FDBA74" stroke-width="1" />

          <!-- Windows — 3 per floor × 3 lit floors = 9 windows. Each .lit
               tile fades in/out on its own delay so the building "comes
               alive" floor by floor. -->
          <g fill="#FED7AA">
            <!-- Floor 3 (top) -->
            <rect class="kamizo-window" style="animation-delay:0.0s"  x="56"  y="80"  width="22" height="22" rx="3" />
            <rect class="kamizo-window" style="animation-delay:0.4s"  x="89"  y="80"  width="22" height="22" rx="3" />
            <rect class="kamizo-window" style="animation-delay:0.8s"  x="122" y="80"  width="22" height="22" rx="3" />
            <!-- Floor 2 -->
            <rect class="kamizo-window" style="animation-delay:1.2s"  x="56"  y="120" width="22" height="22" rx="3" />
            <rect class="kamizo-window" style="animation-delay:1.6s"  x="89"  y="120" width="22" height="22" rx="3" />
            <rect class="kamizo-window" style="animation-delay:2.0s"  x="122" y="120" width="22" height="22" rx="3" />
            <!-- Floor 1 -->
            <rect class="kamizo-window" style="animation-delay:2.4s"  x="56"  y="160" width="22" height="22" rx="3" />
            <rect class="kamizo-window" style="animation-delay:2.8s"  x="89"  y="160" width="22" height="22" rx="3" />
            <rect class="kamizo-window" style="animation-delay:3.2s"  x="122" y="160" width="22" height="22" rx="3" />
          </g>
          <!-- Window cross-mullions — drawn over the lit overlays so each
               window keeps its 4-pane look while glowing. -->
          <g stroke="#FDBA74" stroke-width="1">
            <line x1="56"  y1="91"  x2="78"  y2="91" /><line x1="67"  y1="80"  x2="67"  y2="102" />
            <line x1="89"  y1="91"  x2="111" y2="91" /><line x1="100" y1="80"  x2="100" y2="102" />
            <line x1="122" y1="91"  x2="144" y2="91" /><line x1="133" y1="80"  x2="133" y2="102" />
            <line x1="56"  y1="131" x2="78"  y2="131" /><line x1="67"  y1="120" x2="67"  y2="142" />
            <line x1="89"  y1="131" x2="111" y2="131" /><line x1="100" y1="120" x2="100" y2="142" />
            <line x1="122" y1="131" x2="144" y2="131" /><line x1="133" y1="120" x2="133" y2="142" />
            <line x1="56"  y1="171" x2="78"  y2="171" /><line x1="67"  y1="160" x2="67"  y2="182" />
            <line x1="89"  y1="171" x2="111" y2="171" /><line x1="100" y1="160" x2="100" y2="182" />
            <line x1="122" y1="171" x2="144" y2="171" /><line x1="133" y1="160" x2="133" y2="182" />
          </g>

          <!-- Door — center-bottom. The "Kamizo" entrance for the resident. -->
          <rect x="89" y="200" width="22" height="32" rx="3" fill="#9A3412" />
          <circle cx="105" cy="216" r="1.5" fill="#FED7AA" />

          <!-- Plant tile to the left and right of the door for warmth. -->
          <circle cx="64" cy="226" r="6" fill="#22C55E" />
          <circle cx="136" cy="226" r="6" fill="#22C55E" />
        </svg>

        <!-- Wordmark + thin shimmer progress bar -->
        <div class="kamizo-splash__title">Kamizo</div>
        <div class="kamizo-splash__bar"><span></span></div>
      </div>
    </div>
    <style>
      .kamizo-splash {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 24px;
        background: radial-gradient(ellipse at center top, #FFF7ED 0%, #FFFFFF 70%);
        padding-top: env(safe-area-inset-top, 0);
        padding-bottom: env(safe-area-inset-bottom, 0);
      }
      .kamizo-building {
        filter: drop-shadow(0 14px 30px rgba(249, 115, 22, 0.20));
      }
      .kamizo-sign {
        transform-origin: 100px 28px;
        animation: kamizo-bob 2.4s ease-in-out infinite;
      }
      .kamizo-window {
        animation: kamizo-glow 3.6s ease-in-out infinite;
        transform-origin: center;
      }
      .kamizo-splash__title {
        font: 800 22px/1 -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
        letter-spacing: -0.01em;
        color: #111;
      }
      .kamizo-splash__bar {
        width: 140px; height: 3px;
        border-radius: 999px;
        background: rgba(249, 115, 22, 0.15);
        overflow: hidden;
      }
      .kamizo-splash__bar > span {
        display: block; height: 100%;
        background: linear-gradient(90deg, transparent, rgb(249, 115, 22), transparent);
        animation: kamizo-progress 1.4s ease-in-out infinite;
      }
      @keyframes kamizo-bob {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-3px); }
      }
      @keyframes kamizo-glow {
        0%, 65%, 100% { fill: #FED7AA; }
        15%, 50%      { fill: #F97316; filter: drop-shadow(0 0 6px rgba(249,115,22,0.7)); }
      }
      @keyframes kamizo-progress {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      @media (prefers-reduced-motion: reduce) {
        .kamizo-window, .kamizo-sign, .kamizo-splash__bar > span {
          animation: none !important;
        }
      }
    </style>
    <script>
      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            const registration = await navigator.serviceWorker.register('/sw.js', {
              scope: '/'
            });
            console.log('[App] Service Worker registered:', registration.scope);

            // Check for updates
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              console.log('[App] Service Worker update found');

              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New service worker available, prompt user to refresh
                  console.log('[App] New version available');
                }
              });
            });
          } catch (error) {
            console.error('[App] Service Worker registration failed:', error);
          }
        });
      }
    </script>
