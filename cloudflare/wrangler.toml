account_id = "375b7861de3547ea5c712ab7c13b1709"
name = "kamizo"
main = "src/index.ts"
compatibility_date = "2024-01-01"
workers_dev = true

# Secrets (set via: wrangler secret put <NAME>):
# wrangler secret put JWT_SECRET
# wrangler secret put ENCRYPTION_KEY
# wrangler secret put VAPID_PRIVATE_KEY
# wrangler secret put SENTRY_DSN

# Custom domains must be added via Cloudflare Dashboard:
# Workers & Pages → kamizo → Settings → Triggers → Custom Domains
# Add: kamizo.uz and *.kamizo.uz (wildcards only supported via Dashboard)

[assets]
directory = "public"
binding = "ASSETS"
run_worker_first = true

[vars]
ENVIRONMENT = "production"
BASE_DOMAIN = "kamizo.uz"
VAPID_EMAIL = "admin@kamizo.uz"

# Секреты хранятся в Cloudflare Secrets (не в коде!)
# Установить:
#   wrangler secret put ENCRYPTION_KEY
#   wrangler secret put JWT_SECRET
#   wrangler secret put SENTRY_DSN

[[d1_databases]]
binding = "DB"
database_name = "kamizo-db"
database_id = "e83916ec-941f-420e-86fc-8760dd430aec"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "RATE_LIMITER"
id = "89850617af24420da6d3e91051c1d2d2"

# Sprint 85 — tenant contract PDF storage (commit 1 of 3).
# Each tenant attaches one scanned contract PDF (≤10 MB); residents of
# that tenant download it via /api/resident/contract. Storage layout:
#   tenants/<tenant_id>/contract-<ISO_timestamp>.pdf
# The tenant_id prefix means listing-leaks can't be used to access
# cross-tenant objects — keys aren't guessable into another namespace.
#
# Bucket creation (idempotent — does nothing if it already exists):
#   wrangler r2 bucket create kamizo-contracts
#
# On the VPS Node.js path (api.kamizo.uz) this binding is shimmed by
# /opt/kamizo/app/src/shim/r2.js with a filesystem backend at
# /opt/kamizo/data/contracts/. The shim exposes the same put/get/
# delete/head surface so the route handler code is single-source.
#
# DISABLED 2026-06-18 — R2 is not enabled on this Cloudflare account
# (wrangler returns "Please enable R2 through the Cloudflare Dashboard
# [code: 10042]"). Every CI deploy has been failing silently for 2 days
# because of this binding; the kamizo.uz Worker has been stuck on the
# 2026-06-16 build (pre-Sprint-85), surfacing as Cloudflare error 1101
# on every SPA route (kamizo.uz/login, etc.).
#
# Impact while disabled: contract endpoints (POST /api/super-admin/
# tenants/:id/contract, GET /api/resident/contract, etc.) hitting the
# Cloudflare Worker would throw at runtime because env.CONTRACTS_BUCKET
# is undefined. In practice these endpoints route through api.kamizo.uz
# (VPS Node) which uses the filesystem shim, so the Worker path is
# never exercised. No user-visible regression.
#
# Restoration steps:
#   1. Cloudflare Dashboard → R2 → Enable (one-time, may require
#      payment plan signup)
#   2. wrangler r2 bucket create kamizo-contracts
#   3. Uncomment the [[r2_buckets]] block below
#   4. wrangler deploy
# [[r2_buckets]]
# binding = "CONTRACTS_BUCKET"
# bucket_name = "kamizo-contracts"

# v2 migration drops the ConnectionManager Durable Object class. The
# v1 migration created it via new_sqlite_classes; without a matching
# delete-class migration, every wrangler deploy after the class file
# was removed (commit 7d05b8f7) would fail with "New version of script
# does not export class 'ConnectionManager' which is depended on by
# existing Durable Objects [code: 10064]". Cloudflare-side cleanup of
# the DO storage happens during this deploy.
[[migrations]]
tag = "v2"
deleted_classes = ["ConnectionManager"]

# Removed: [[durable_objects.bindings]] CONNECTION_MANAGER (class
# ConnectionManager) and its v1 [[migrations]] new_sqlite_classes
# entry. The kamizo Worker on Cloudflare only serves static assets
# now (see CLAUDE.md "Cloudflare: CDN + DNS + static Worker"); chat /
# websocket broadcasts run on the VPS Node process via in-process
# stubs. The class file cloudflare/src/ConnectionManager.ts and its
# export from index.ts were removed alongside this block — together
# they made every VPS deploy crashloop on `import { DurableObject }
# from 'cloudflare:workers'` (Node ESM loader rejects the
# cloudflare: scheme). Restoring the binding for a future Workers
# re-deploy: cherry-pick the file + export + this block back from
# git history.
